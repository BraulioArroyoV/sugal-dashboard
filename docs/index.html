<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sugal — Dashboard Báscula</title>
<style>
  body { font-family: system-ui, sans-serif; background: #f5f3f0; display: flex;
         justify-content: center; align-items: center; height: 100vh; margin: 0; }
  .box { background: #fff; border-radius: 12px; padding: 40px 48px; text-align: center;
         box-shadow: 0 4px 20px rgba(200,16,46,.12); max-width: 420px; }
  .logo { background: #c8102e; color: #fff; font-weight: 900; font-size: 1.1rem;
          border-radius: 8px; padding: 8px 16px; display: inline-block; margin-bottom: 20px; }
  h1 { color: #1a1210; font-size: 1.3rem; margin: 0 0 10px; }
  p  { color: #6b5f5a; font-size: .9rem; line-height: 1.6; }
  .badge { background: #fef2f2; border: 1px solid #fca5a5; color: #c8102e;
           border-radius: 20px; padding: 4px 14px; font-size: .75rem; font-weight: 700;
           display: inline-block; margin-top: 16px; }
</style>
</head>
<body>
  <div class="box">
    <div class="logo">SUGAL</div>
    <h1>Dashboard Báscula Operacional</h1>
    <p>El reporte diario aparecerá aquí después del primer envío.<br>
       Ejecuta <strong>ejecutar_prueba.bat</strong> y luego <strong>publicar.bat</strong>.</p>
    <div class="badge">Pendiente de primer reporte</div>
  </div>
</body>
</html>
